url: https://devminka.github.io/rminka/

template:
  bootstrap: 5
  bootswatch: sandstone

navbar:
  structure:
    left: [intro, reference, articles, changelog]
    right: [search, github]
  components:
    intro:
      text: Get Started
      href: articles/introduction-to-rminka.html
    reference:
      text: Reference
      href: reference/index.html
    changelog:
      text: Changelog
      menu:
        - text: News (Changelog)
          href: news/index.html
        - text: Releases
          href: https://github.com/devminka/rminka/releases
    github:
      icon: fab fa-github
      href: https://github.com/devminka/rminka/
      aria-label: Repositorio en GitHub

reference:
  - title: Project Queries
    desc: >
      A set of complementary functions to find projects and their associated
      observations.
    contents:
      - mnk_proj_byname
      - mnk_proj_info
      - mnk_proj_user
      - mnk_proj_obs
  - title: User Queries
    desc: >
      Functions to find users and their contributed observations.
    contents:
      - mnk_user_byname
      - mnk_user_info
      - mnk_user_proj
      - mnk_user_obs
  - title: Place Queries
    desc: >
      Functions to find places and retrieve their spatial data and their
      associated observations.
    contents:
      - mnk_place_byname
      - mnk_place_sf
      - mnk_place_obs
  - title: Observation Queries
    desc: >
      A variety of functions to fetch observation data based on different
      parameters.
    contents:
      - mnk_obs_id
      - mnk_obs
      - mnk_obs_byday
  - title: Auxiliary functions
    desc: >
      A set of functions with different utilities that complement Minka's
      observational data and help in processing them when used in other R packages
      (`vegan`, `dismo`, `labdsv` or others).
    contents:
      - export_mnk_qgis
      - mnk_obs_sf
      - get_wrm_tax
      - shrt_name
