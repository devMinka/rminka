name: test-coverage
on: [push, pull_request]
permissions:
  contents: read
jobs:
  test-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr
          needs: coverage
      - run: covr::codecov(quiet = FALSE)
        shell: Rscript {0}
